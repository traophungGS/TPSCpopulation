<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trao Phung Satellites Community Population</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeIn 0.6s ease-in;
        }

        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .total-population {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px 40px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.6s ease-out;
            position: relative;
        }

        .youtube-icon-container {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .youtube-icon-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: #FF0000;
            border-radius: 50%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.3);
            text-decoration: none;
        }

        .youtube-icon-link:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(255, 0, 0, 0.5);
        }

        .youtube-icon-link svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .total-population-label {
            color: #667eea;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            padding-right: 50px;
        }

        .total-population-count {
            color: #764ba2;
            font-size: 3em;
            font-weight: 800;
            min-width: 150px;
        }

        .loading {
            color: #999;
            font-style: italic;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .server-card {
            background: white;
            border-radius: 15px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.6s ease-out;
            animation-fill-mode: both;
        }

        .server-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
        }

        .server-card:nth-child(1) { animation-delay: 0.1s; }
        .server-card:nth-child(2) { animation-delay: 0.2s; }
        .server-card:nth-child(3) { animation-delay: 0.3s; }
        .server-card:nth-child(4) { animation-delay: 0.4s; }

        .server-icon-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .server-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            border: 3px solid #667eea;
            background: #f0f0f0;
        }

        .server-name {
            color: #667eea;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        .member-count {
            color: #764ba2;
            font-size: 3.5em;
            font-weight: 800;
            margin-bottom: 15px;
            min-height: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .members-label {
            color: #999;
            font-size: 0.9em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .server-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            transition: opacity 0.3s ease, transform 0.2s ease;
        }

        .server-link:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .total-population-count { font-size: 2em; }
            .member-count { font-size: 2.5em; }
            .container { grid-template-columns: 1fr; gap: 20px; }
            .server-icon {
                width: 80px;
                height: 80px;
            }
            .youtube-icon-link {
                width: 40px;
                height: 40px;
            }
            .youtube-icon-link svg {
                width: 22px;
                height: 22px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Trao Phung Satellites Community</h1>
        <div class="total-population">
            <div class="youtube-icon-container">
                <a href="https://www.youtube.com/@TraoPhungSatellites" target="_blank" rel="noopener noreferrer" class="youtube-icon-link" title="Visit YouTube Channel">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                </a>
            </div>
            <div class="total-population-label">Total Community Population</div>
            <div class="total-population-count" id="totalCount">
                <span class="loading">Loading...</span>
            </div>
        </div>
    </header>

    <div class="container" id="serverContainer">
        <!-- Populated by JavaScript -->
    </div>

    <script>
        // Server configurations with invite codes
        const servers = [
            { 
                name: 'Traophs Hub',
                inviteCode: 'fnDYaTEzSt',
                inviteUrl: 'https://discord.gg/fnDYaTEzSt',
                memberCount: 0,
                icon: ''
            },
            { 
                name: 'Friendly Server',
                inviteCode: 'BuMnmqNUXJ',
                inviteUrl: 'https://discord.gg/BuMnmqNUXJ',
                memberCount: 0,
                icon: ''
            },
            { 
                name: 'Secretarial Pact',
                inviteCode: 'HBfttY3bqQ',
                inviteUrl: 'https://discord.gg/HBfttY3bqQ',
                memberCount: 0,
                icon: ''
            },
            { 
                name: 'Eastern Federation',
                inviteCode: 'bg2jNnHRcc',
                inviteUrl: 'https://discord.gg/bg2jNnHRcc',
                memberCount: 0,
                icon: ''
            },
            {
                name: 'ChatAI support server',
                inviteCode: 'RewMNNyW6V',
                inviteUrl: 'https://discord.gg/RewMNNyW6V',
                memberCount: 0,
                icon: ''
            }
        ];

        // Fetch member count and icon from Discord invite
        async function fetchInviteData(inviteCode) {
            try {
                const response = await fetch(`https://discord.com/api/v10/invites/${inviteCode}?with_counts=true&with_expiration=true`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                return {
                    memberCount: data.approximate_member_count || 0,
                    icon: data.guild?.icon ? `https://cdn.discordapp.com/icons/${data.guild.id}/${data.guild.icon}.png` : null
                };
            } catch (error) {
                console.error(`Error fetching invite ${inviteCode}:`, error);
                return {
                    memberCount: 0,
                    icon: null
                };
            }
        }

        // Update all server counts and icons
        async function updateCounts() {
            try {
                // Fetch all invite data
                const inviteDataArray = await Promise.all(
                    servers.map(server => fetchInviteData(server.inviteCode))
                );

                // Update server data
                servers.forEach((server, index) => {
                    server.memberCount = inviteDataArray[index].memberCount;
                    server.icon = inviteDataArray[index].icon;
                });

                // Render cards
                renderCards();

                // Calculate and update total
                const total = servers.reduce((sum, server) => sum + server.memberCount, 0);
                document.getElementById('totalCount').textContent = total.toLocaleString();

            } catch (error) {
                console.error('Error updating counts:', error);
                document.getElementById('totalCount').innerHTML = '<span class="loading">Error loading data</span>';
            }
        }

        // Render server cards
        function renderCards() {
            const container = document.getElementById('serverContainer');
            container.innerHTML = '';

            servers.forEach(server => {
                const card = document.createElement('div');
                card.className = 'server-card';
                
                const iconHtml = server.icon 
                    ? `<img src="${server.icon}" alt="${server.name} icon" class="server-icon" onerror="this.style.display='none'">`
                    : `<div class="server-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 40px;">👥</div>`;

                card.innerHTML = `
                    <div class="server-icon-container">
                        ${iconHtml}
                    </div>
                    <div class="server-name">${server.name}</div>
                    <div class="member-count">${server.memberCount.toLocaleString()}</div>
                    <div class="members-label">Members</div>
                    <a href="${server.inviteUrl}" target="_blank" rel="noopener noreferrer" class="server-link">
                        Join Server
                    </a>
                `;
                container.appendChild(card);
            });
        }

        // Initial load
        updateCounts();

        // Update every 30 seconds
        setInterval(updateCounts, 30000);
    </script>
</body>
</html>
