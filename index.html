<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trao Phung Satellites Community Population</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeIn 0.6s ease-in;
        }

        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .total-population {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px 40px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.6s ease-out;
        }

        .total-population-label {
            color: #667eea;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .total-population-count {
            color: #764ba2;
            font-size: 3em;
            font-weight: 800;
            min-width: 150px;
        }

        .loading {
            color: #999;
            font-style: italic;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .server-card {
            background: white;
            border-radius: 15px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.6s ease-out;
            animation-fill-mode: both;
        }

        .server-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
        }

        .server-card:nth-child(1) { animation-delay: 0.1s; }
        .server-card:nth-child(2) { animation-delay: 0.2s; }
        .server-card:nth-child(3) { animation-delay: 0.3s; }
        .server-card:nth-child(4) { animation-delay: 0.4s; }

        .server-name {
            color: #667eea;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .member-count {
            color: #764ba2;
            font-size: 3.5em;
            font-weight: 800;
            margin-bottom: 15px;
            min-height: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .members-label {
            color: #999;
            font-size: 0.9em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .server-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            transition: opacity 0.3s ease, transform 0.2s ease;
        }

        .server-link:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .total-population-count { font-size: 2em; }
            .member-count { font-size: 2.5em; }
            .container { grid-template-columns: 1fr; gap: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Trao Phung Satellites Community</h1>
        <div class="total-population">
            <div class="total-population-label">Total Community Population</div>
            <div class="total-population-count" id="totalCount">
                <span class="loading">Loading...</span>
            </div>
        </div>
    </header>

    <div class="container" id="serverContainer">
        <!-- Populated by JavaScript -->
    </div>

    <script>
        // Server configurations with invite codes
        const servers = [
            { 
                name: 'Traophs Hub',
                inviteCode: 'fnDYaTEzSt',
                inviteUrl: 'https://discord.gg/fnDYaTEzSt',
                memberCount: 0
            },
            { 
                name: 'Friendly Server',
                inviteCode: 'BuMnmqNUXJ',
                inviteUrl: 'https://discord.gg/BuMnmqNUXJ',
                memberCount: 0
            },
            { 
                name: 'Secretarial Pact',
                inviteCode: 'HBfttY3bqQ',
                inviteUrl: 'https://discord.gg/HBfttY3bqQ',
                memberCount: 0
            },
            { 
                name: 'Eastern Federation',
                inviteCode: 'bg2jNnHRcc',
                inviteUrl: 'https://discord.gg/bg2jNnHRcc',
                memberCount: 0
            }
        ];

        // Fetch member count from Discord invite
        async function fetchInviteData(inviteCode) {
            try {
                const response = await fetch(`https://discord.com/api/v10/invites/${inviteCode}?with_counts=true&with_expiration=true`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                return data.approximate_member_count || 0;
            } catch (error) {
                console.error(`Error fetching invite ${inviteCode}:`, error);
                return 0;
            }
        }

        // Update all server counts
        async function updateCounts() {
            try {
                // Fetch all member counts
                const counts = await Promise.all(
                    servers.map(server => fetchInviteData(server.inviteCode))
                );

                // Update server data
                servers.forEach((server, index) => {
                    server.memberCount = counts[index];
                });

                // Render cards
                renderCards();

                // Calculate and update total
                const total = servers.reduce((sum, server) => sum + server.memberCount, 0);
                document.getElementById('totalCount').textContent = total.toLocaleString();

            } catch (error) {
                console.error('Error updating counts:', error);
                document.getElementById('totalCount').innerHTML = '<span class="loading">Error loading data</span>';
            }
        }

        // Render server cards
        function renderCards() {
            const container = document.getElementById('serverContainer');
            container.innerHTML = '';

            servers.forEach(server => {
                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                    <div class="server-name">${server.name}</div>
                    <div class="member-count">${server.memberCount.toLocaleString()}</div>
                    <div class="members-label">Members</div>
                    <a href="${server.inviteUrl}" target="_blank" rel="noopener noreferrer" class="server-link">
                        Join Server
                    </a>
                `;
                container.appendChild(card);
            });
        }

        // Initial load
        updateCounts();

        // Update every 30 seconds
        setInterval(updateCounts, 30000);
    </script>
</body>
</html>
